# joterblox.mosni.dev → node app (websockets). certbot adds the 443 blocks.
server {
    server_name joterblox.mosni.dev;
    location / {
        proxy_pass http://127.0.0.1:33016;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/joterblox.nimos.ws/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/joterblox.nimos.ws/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

# Legacy joterblox.nimos.ws → permanent redirect to joterblox.mosni.dev. certbot adds the 443 block.
server {
    server_name joterblox.nimos.ws;
    location / { return 301 https://joterblox.mosni.dev$request_uri; }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/joterblox.nimos.ws/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/joterblox.nimos.ws/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

server {
    if ($host = joterblox.mosni.dev) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    server_name joterblox.mosni.dev;
    listen 80;
    return 404; # managed by Certbot


}
server {
    if ($host = joterblox.nimos.ws) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    server_name joterblox.nimos.ws;
    listen 80;
    return 404; # managed by Certbot


}
